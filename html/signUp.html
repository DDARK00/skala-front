<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css" />
    <title>회원가입</title>
</head>

<body>
    <div class="trip-header-gap"> </div>
    <header class="trip-header-container header-center">
        <div class="trip-header-text">
            <p class="trip-eyebrow">
                <a href="index.html"> &lt;Home&gt;</a>
                ACCOUNT SETUP · 2026</p>
            <h1>👤 회원가입</h1>
            <p class="trip-subtitle">서비스를 이용하기 위한 회원 정보를 입력해 주세요.</p>
        </div>
    </header>

    <main>
        <section class="signup">
            <form class="form-card" action="signUpResult.html" method="get">

                <fieldset class="form-section">
                    <legend>🔒 계정 정보</legend>

                    <p class="field">
                        <label for="userId">아이디 *</label>
                        <input type="text" id="userId" name="userId" placeholder="영문과 숫자 조합 (4~20자)" minlength="4"
                            maxlength="20" pattern="[A-Za-z0-9]+" autocomplete="username" required>
                        <small id="userIdMessage" class="field-hint"></small>
                    </p>

                    <p class="field">
                        <label for="password">비밀번호 *</label>
                        <input type="password" id="password" name="password" placeholder="8자 이상 입력" minlength="8"
                            autocomplete="new-password" required>
                        <small id="passwordMessage" class="field-hint"></small>
                    </p>

                    <p class="field">
                        <label for="passwordCheck">비밀번호 확인 *</label>
                        <input type="password" id="passwordCheck" placeholder="비밀번호를 다시 입력하세요" required>
                        <small id="passwordCheckMessage" class="field-hint"></small>
                    </p>

                    <p class="field field--inline">
                        <input type="checkbox" id="pwOpen">
                        <label for="pwOpen">비밀번호 보기</label>
                    </p>

                    <p class="field">
                        <label for="emailId">이메일 *</label>
                        <span class="email-row">
                            <input type="text" id="emailId" name="emailId" placeholder="example" autocomplete="email"
                                required>
                            <span class="email-at" aria-hidden="true">@</span>
                            <select id="emailDomain" name="emailDomain" required>
                                <option value="">선택하세요</option>
                                <option value="gmail.com">gmail.com</option>
                                <option value="naver.com">naver.com</option>
                                <option value="kakao.com">kakao.com</option>
                                <option value="outlook.com">outlook.com</option>
                                <option value="direct">직접 입력</option>
                            </select>
                            <input type="text" id="customDomain" name="customDomain" placeholder="도메인 직접 입력" disabled>
                        </span>
                        <small id="emailMessage" class="field-hint"></small>
                    </p>
                </fieldset>

                <fieldset class="form-section">
                    <legend>👤 개인 프로필 정보</legend>

                    <p class="field">
                        <label for="name">이름 *</label>
                        <input type="text" id="name" name="name" placeholder="이름 입력" autocomplete="name" required>
                    </p>

                    <p class="field">
                        <label for="birth">생년월일 *</label>
                        <input type="date" id="birth" name="birth" autocomplete="bday" required>
                    </p>

                    <fieldset class="choice-group">
                        <legend>성별 *</legend>
                        <div class="choice-row">
                            <label for="male">
                                <span class="choice">
                                    <input type="radio" id="male" name="gender" value="male" required>
                                    남성
                                </span>
                            </label>
                            <label for="female">
                                <span class="choice">
                                    <input type="radio" id="female" name="gender" value="female">
                                    여성
                                </span>
                            </label>
                            <label for="other">
                                <span class="choice">
                                    <input type="radio" id="other" name="gender" value="other">
                                    기타
                                </span>
                            </label>
                        </div>
                    </fieldset>

                    <fieldset class="choice-group">
                        <legend>관심 분야 (중복 선택 가능)</legend>
                        <div class="choice-row">
                            <label for="frontend">
                            <span class="choice">
                                <input type="checkbox" id="frontend" name="interest" value="frontend">
                                    웹 프론트엔드
                                </span>
                            </label>
                            <label for="uiux">
                            <span class="choice">
                                <input type="checkbox" id="uiux" name="interest" value="uiux">
                                    UI/UX 디자인 표준
                                </span>
                            </label>
                            <label for="backend">
                                <span class="choice">
                                    <input type="checkbox" id="backend" name="interest" value="backend">
                                    백엔드 데이터베이스
                                </span>
                            </label>
                            <label for="cloud">
                            <span class="choice">
                                <input type="checkbox" id="cloud" name="interest" value="cloud">
                                    클라우드 인프라
                                </span>
                            </label>
                        </div>
                    </fieldset>

                    <p class="field">
                        <label for="joinPath">가입 경로</label>
                        <select id="joinPath" name="joinPath">
                            <option value="">선택하세요</option>
                            <option value="search">인터넷 검색</option>
                            <option value="friend">친구 추천</option>
                            <option value="github">GitHub</option>
                            <option value="sns">SNS</option>
                            <option value="academy">교육기관</option>
                            <option value="etc">기타</option>
                        </select>
                    </p>
                </fieldset>

                <fieldset class="form-section">
                    <legend>📝 자기소개</legend>
                    <p class="field">
                        <label for="intro">나를 표현하는 한 줄 소개</label>
                        <textarea maxlength="200" id="intro" name="intro" rows="5"
                            placeholder="안녕하세요. 웹 개발에 관심이 많아 가입했습니다."></textarea>
                        <small id="introCount" class="field-hint field-hint--end"></small>
                    </p>
                </fieldset>

                <fieldset class="form-section">
                    <legend>📄 약관 동의</legend>
                    <details class="terms-box">
                        <summary>이용약관 보기</summary>
                        <div class="terms-content">
                            <p>
                                본 사이트는 학습 목적으로 제작되었습니다.
                                입력된 정보는 실제 서비스에 저장되지 않습니다.
                            </p>
                        </div>
                    </details>
                    <p class="field field--inline">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms">이용약관에 동의합니다. (필수)</label>
                    </p>
                    <p class="field field--inline">
                        <input type="checkbox" id="agreePrivacy" name="agreePrivacy">
                        <label for="agreePrivacy">개인정보 수집 및 이용에 동의합니다.</label>
                    </p>
                </fieldset>

                <p class="form-actions">
                    <input type="submit" value="동의하고 회원가입" class="btn btn--primary">
                    <input type="reset" value="다시 작성" class="btn btn--ghost">
                </p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>📅 작업일 : <time datetime="2026-07">2026년 7월</time></p>
    </footer>

    <script>
        const userId = document.querySelector("#userId");
        const password = document.querySelector("#password");
        const passwordCheck = document.querySelector("#passwordCheck");
        const pwOpen = document.querySelector("#pwOpen");

        const emailDomain = document.querySelector("#emailDomain");
        const customDomain = document.querySelector("#customDomain");

        const intro = document.querySelector("#intro");
        const form = document.querySelector("form");

        const userIdMessage = document.querySelector("#userIdMessage");
        const passwordMessage = document.querySelector("#passwordMessage");
        const passwordCheckMessage = document.querySelector("#passwordCheckMessage");
        const emailMessage = document.querySelector("#emailMessage");
        const introCount = document.querySelector("#introCount");

        introCount.textContent = "0 / 200";

        // ---------- 아이디 길이 안내 ----------
        userId.addEventListener("input", () => {
            userIdMessage.textContent = userId.value.length < 4
                ? "❌ 아이디는 4자 이상 입력하세요."
                : "✔ 사용 가능한 길이입니다.";
        });

        // ---------- 비밀번호 강도 안내 ----------
        password.addEventListener("input", () => {
            const value = password.value;
            const isStrong = /[A-Z]/.test(value) && /[0-9]/.test(value) && /[^A-Za-z0-9]/.test(value);

            if (value.length < 8) {
                passwordMessage.textContent = "❌ 8자 이상 입력하세요.";
            } else if (isStrong) {
                passwordMessage.textContent = "✔ 안전한 비밀번호입니다.";
            } else {
                passwordMessage.textContent = "⚠ 영문 대문자, 숫자, 특수문자를 함께 사용하면 더욱 안전합니다.";
            }

            updatePasswordMatch();
        });

        // ---------- 비밀번호 확인 일치 여부 ----------
        function updatePasswordMatch() {
            if (!passwordCheck.value) {
                passwordCheckMessage.textContent = "";
                return;
            }
            passwordCheckMessage.textContent = password.value === passwordCheck.value
                ? "✔ 비밀번호가 일치합니다."
                : "❌ 비밀번호가 일치하지 않습니다.";
        }
        passwordCheck.addEventListener("input", updatePasswordMatch);

        // ---------- 비밀번호 보기 ----------
        pwOpen.addEventListener("change", () => {
            const type = pwOpen.checked ? "text" : "password";
            password.type = type;
            passwordCheck.type = type;
        });

        // ---------- 이메일 도메인 직접 입력 ----------
        emailDomain.addEventListener("change", () => {
            const isDirect = emailDomain.value === "direct";
            customDomain.disabled = !isDirect;
            customDomain.required = isDirect;

            if (isDirect) {
                customDomain.value = "";
                customDomain.focus();
                emailMessage.textContent = "도메인을 직접 입력하세요.";
            } else {
                customDomain.value = "";
                emailMessage.textContent = emailDomain.value ? "✔ 이메일 도메인이 선택되었습니다." : "";
            }
        });

        // ---------- 자기소개 글자수 ----------
        intro.addEventListener("input", () => {
            introCount.textContent = `${intro.value.length} / 200`;
        });

        // ---------- 이용약관 부드럽게 열고 닫기 ----------
        const termsBox = document.querySelector(".terms-box");
        const termsSummary = termsBox.querySelector("summary");
        const termsContent = termsBox.querySelector(".terms-content");

        termsSummary.addEventListener("click", (event) => {
            event.preventDefault();
            termsBox.open ? closeTerms() : openTerms();
        });

        function openTerms() {
            termsBox.open = true;
            const targetHeight = termsContent.scrollHeight;
            termsContent.style.height = "0px";
            requestAnimationFrame(() => {
                termsContent.style.height = targetHeight + "px";
            });
            termsContent.addEventListener("transitionend", function onEnd() {
                termsContent.style.height = "auto";
                termsContent.removeEventListener("transitionend", onEnd);
            }, { once: true });
        }

        function closeTerms() {
            termsContent.style.height = termsContent.scrollHeight + "px";
            requestAnimationFrame(() => {
                termsContent.style.height = "0px";
            });
            termsContent.addEventListener("transitionend", function onEnd() {
                termsBox.open = false;
                termsContent.style.height = "";
                termsContent.removeEventListener("transitionend", onEnd);
            }, { once: true });
        }

        // ---------- 제출 전 최종 확인 ----------
        form.addEventListener("submit", (event) => {
            if (password.value !== passwordCheck.value) {
                event.preventDefault();
                updatePasswordMatch();
                passwordCheck.focus();
            }
        });
    </script>
    <!-- \전역 분리용 Canvas 앵커 컨테이너 및 여름 계절감 배경 모듈 스크립트 -->
    <div id="summer-canvas-anchor"></div>
    <script src="../script/summer-canvas.js"></script>
</body>

</html>
