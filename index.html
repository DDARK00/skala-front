<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>이동 중...</title>
    <!-- 1. 자바스크립트를 이용한 즉시 이동 -->
    <script>
        window.location.href = "./html/index.html";
    </script>
    
    <!-- 2. (백업용) 자바스크립트가 꺼져있을 경우를 대비한 0초 뒤 자동 이동 -->
    <meta http-equiv="refresh" content="0; url=./html/index.html">
</head>
<body>
    <p>페이지를 이동하고 있습니다. 잠시만 기다려주세요...</p>
    <p>이동하지 않는다면 <a href="./html/index.html">여기</a>를 클릭하세요.</p>
</body>
</html>
